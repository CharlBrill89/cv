<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Contact — Charl Brill</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .contact-card {
      background-color: rgba(27, 31, 34, 0.92);
      border-radius: 4px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 36rem;
      width: 100%;
    }
    .contact-card h1 {
      font-size: 1.5rem;
      letter-spacing: 0.5rem;
      margin-bottom: 2rem;
      padding-bottom: 0.5rem;
      border-bottom: solid 1px #ffffff;
      width: max-content;
    }
    .contact-card .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.2rem;
      text-transform: uppercase;
      opacity: 0.75;
    }
    .contact-card .back-link:hover {
      opacity: 1;
    }
  </style>
</head>

<body class="is-preload">

  <div id="bg"></div>

  <div class="contact-card">
    <h1>Contact</h1>

    <form action="mailto:charlbrill@gmail.com" method="post" enctype="text/plain">
      <div class="fields">
        <div class="field half">
          <label for="contact-name">Your Name</label>
          <input type="text" id="contact-name" name="YourName" placeholder="Jane Doe" />
        </div>
        <div class="field half">
          <label for="contact-email">Your Email</label>
          <input type="email" id="contact-email" name="YourEmail" placeholder="jane@example.com" />
        </div>
        <div class="field">
          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="Message" rows="6" placeholder="Enter your message"></textarea>
        </div>
      </div>
      <ul class="actions">
        <li><input type="submit" value="Send Message" class="primary" /></li>
        <li><input type="reset" value="Reset" /></li>
      </ul>
    </form>

    <a href="index.html" class="back-link">← Back to home</a>
  </div>

  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/browser.min.js"></script>
  <script src="assets/js/breakpoints.min.js"></script>
  <script src="assets/js/util.js"></script>
  <script src="assets/js/main.js"></script>

</body>

</html>
